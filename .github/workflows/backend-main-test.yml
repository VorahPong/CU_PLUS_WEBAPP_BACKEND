

name: Backend Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Node.js tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cu_plus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d cu_plus_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cu_plus_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/cu_plus_test?schema=public
      CLOUDINARY_CLOUD_NAME: test-cloud
      CLOUDINARY_API_KEY: test-api-key
      CLOUDINARY_API_SECRET: test-api-secret
      AWS_ACCESS_KEY_ID: test-access-key
      AWS_SECRET_ACCESS_KEY: test-secret-key
      AWS_REGION: us-east-1
      AWS_S3_BUCKET_NAME: test-bucket

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run tests if configured
        run: |
          TEST_SCRIPT=$(node -p "require('./package.json').scripts?.test || ''")
          if [ -z "$TEST_SCRIPT" ] || [ "$TEST_SCRIPT" = "echo \"Error: no test specified\" && exit 1" ]; then
            echo "No backend test script configured yet. Skipping npm test."
          else
            npm test
          fi